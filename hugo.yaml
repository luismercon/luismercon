baseURL: "https://luismercon.github.io/"
title: "Luis Merçon"
defaultContentLanguage: "pt-br"
defaultContentLanguageInSubdir: false

languages:
  pt-br:
    label: "Português"
    weight: 1
    params:
      description: "Engenheiro de Software com mentalidade de negócios e formação em Direito | Engenharia orientada por IA na Critical Software | Mestrando em Engenharia Informática no ISEC"
      homeKicker: "Ensaios e notas de campo"
      homeTitle: "Escrevendo sobre software, devagar."
      homeIntro: "Notas sobre modernizar os sistemas que herdamos, e sobre trabalhar lado a lado com máquinas que agora também escrevem código."
  en:
    label: "English"
    weight: 2
    params:
      description: "Business-Minded Software Engineer with a Legal Background | AI-Driven Engineering at Critical Software | MSc Candidate in Computer Engineering at ISEC"
      homeKicker: "Essays & field notes"
      homeTitle: "Writing on software, slowly."
      homeIntro: "Notes on modernising the systems we inherit, and working alongside machines that now write code too."

params:
  author: "Luis Merçon"
  linkedin: "https://www.linkedin.com/in/luismercon/"

permalinks:
  blog: "/blog/:slug/"
  socialmedia: "/socialmedia/:sections[1:]/:slug/"

menus:
  main:
    - name: "Writing"
      url: "/blog/"
      weight: 1
    - name: "Social Media"
      url: "/socialmedia/"
      weight: 2
    - name: "Topics"
      url: "/tags/"
      weight: 3
    - name: "About"
      url: "/about/"
      weight: 4

outputs:
  home: ["HTML", "RSS"]
  section: ["HTML", "RSS"]

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: "dracula"
    lineNos: true
