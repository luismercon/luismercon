baseURL: "https://luismercon.github.io/"
title: "Luis Merçon"
defaultContentLanguage: "pt-br"
defaultContentLanguageInSubdir: false

languages:
  pt-br:
    label: "Português"
    weight: 1
    params:
      description: "Engenheiro de Software com mentalidade de negócios e formação em Direito | Engenharia orientada por IA | Mestrando em Engenharia Informática no ISEC"
      homeKicker: "Ensaios e notas de campo"
      homeTitle: "Escrevendo sobre software, devagar."
      homeIntro: "Notas sobre construir software ao lado de máquinas que escrevem código, carreiras não-lineares, e coisas que ficam entre o técnico e o filosófico."
  en:
    label: "English"
    weight: 2
    params:
      description: "Business-Minded Software Engineer with a Legal Background | AI-Driven Engineering | MSc Candidate in Computer Engineering at ISEC"
      homeKicker: "Essays & field notes"
      homeTitle: "Writing on software, slowly."
      homeIntro: "Notes on building software alongside machines that write code, non-linear careers, and things that sit between the technical and the philosophical."

params:
  author: "Luis Merçon"
  linkedin: "https://www.linkedin.com/in/luismercon/"

permalinks:
  blog: "/blog/:slug/"

taxonomies: {}

menus:
  main:
    - name: "Blog"
      url: "/blog/"
      weight: 1
    - name: "About"
      url: "/about/"
      weight: 2

outputs:
  home: ["HTML", "RSS"]
  section: ["HTML", "RSS"]

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: "dracula"
    lineNos: true
