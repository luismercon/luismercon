{{ define "main" }}
<div class="wrap">
  <div class="page-intro page-intro--left">
    <span class="kicker">{{ i18n "nav_topics" }}</span>
    <h1>{{ .Title }}</h1>
    <p style="font-style:italic">{{ i18n "topics_intro" }}</p>
  </div>
  <div class="tag-cloud">
    {{ range .Pages.ByTitle }}
    <a class="tag" href="{{ .RelPermalink }}">{{ .Title }} <span class="count">{{ len .Pages }}</span></a>
    {{ end }}
  </div>
</div>
{{ end }}
